<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PlantMon">
<title>Plant Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #5aff7e;
    --green-dim: #1a3a22;
    --amber: #ffb830;
    --amber-dim: #3a2a0a;
    --blue: #4aadff;
    --blue-dim: #0a1e3a;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: #666;
    --font-head: 'Cabinet Grotesk', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-head);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 420px;
    margin: 0 auto;
    padding: 0 0 40px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: 52px 24px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .header-title { font-size: 11px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; font-family: var(--font-mono); margin-bottom: 4px; }
  .header-plant { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .conn-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: var(--font-mono); color: var(--muted); margin-top: 4px; }
  .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.4s; }
  .conn-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .conn-dot.error { background: #ff4a4a; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .settings-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted);
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .settings-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .settings-btn svg { width: 16px; height: 16px; }

  /* Gauge card */
  .gauge-card {
    margin: 0 16px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .gauge-card::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(90,255,126,0.06) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.6s;
  }
  .gauge-card.dry::before { background: radial-gradient(circle, rgba(255,184,48,0.08) 0%, transparent 70%); }
  .gauge-card.wet::before { background: radial-gradient(circle, rgba(74,173,255,0.08) 0%, transparent 70%); }

  .gauge-wrap { position: relative; width: 200px; height: 115px; margin-bottom: 8px; }
  .gauge-wrap svg { width: 200px; overflow: visible; }
  #gauge-arc { transition: stroke-dashoffset 0.8s cubic-bezier(0.34,1.56,0.64,1), stroke 0.6s; }
  .gauge-pct {
    position: absolute; bottom: -4px; width: 100%;
    text-align: center;
    font-size: 48px; font-weight: 800;
    letter-spacing: -0.04em;
    transition: color 0.6s;
  }

  .status-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 7px 16px; border-radius: 99px;
    font-size: 13px; font-weight: 500;
    font-family: var(--font-mono);
    margin-top: 16px;
    transition: all 0.4s;
  }
  .pill-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .pill-ok  { background: var(--green-dim); color: var(--green); }
  .pill-ok .pill-dot { background: var(--green); }
  .pill-dry { background: var(--amber-dim); color: var(--amber); }
  .pill-dry .pill-dot { background: var(--amber); }
  .pill-wet { background: var(--blue-dim); color: var(--blue); }
  .pill-wet .pill-dot { background: var(--blue); }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 16px 16px; }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }
  .metric-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: var(--font-mono); margin-bottom: 8px; }
  .metric-value { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .metric-unit { font-size: 13px; font-weight: 400; color: var(--muted); margin-left: 2px; }

  /* History */
  .history-card {
    margin: 0 16px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
  }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .history-title { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: var(--font-mono); }
  .history-count { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
  .bars { display: flex; align-items: flex-end; gap: 5px; height: 64px; }
  .bar { flex: 1; border-radius: 3px 3px 0 0; transition: height 0.5s cubic-bezier(0.34,1.56,0.64,1), background 0.4s; min-height: 3px; }

  /* Refresh button */
  .refresh-btn {
    margin: 0 16px;
    width: calc(100% - 32px);
    padding: 16px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s;
    letter-spacing: -0.01em;
  }
  .refresh-btn:hover { background: var(--surface); border-color: rgba(255,255,255,0.15); }
  .refresh-btn:active { transform: scale(0.98); }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .refresh-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* Settings panel */
  .settings-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .settings-overlay.open { display: flex; align-items: flex-end; }
  .settings-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    width: 100%; max-width: 420px;
    margin: 0 auto;
    padding: 28px 24px 40px;
  }
  .settings-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 24px; }
  .settings-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.02em; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: var(--font-mono); margin-bottom: 8px; }
  .field input {
    width: 100%; padding: 12px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-family: var(--font-mono); font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .field input:focus { border-color: rgba(255,255,255,0.25); }
  .save-btn {
    width: 100%; padding: 14px;
    background: var(--green); color: #000;
    border: none; border-radius: 14px;
    font-family: var(--font-head); font-size: 15px; font-weight: 800;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s;
    letter-spacing: -0.01em;
  }
  .save-btn:hover { opacity: 0.9; }

  /* Error toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1c1010; border: 1px solid #3a1a1a;
    color: #ff7a7a; padding: 12px 20px; border-radius: 12px;
    font-size: 13px; font-family: var(--font-mono);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; z-index: 200;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .last-updated { text-align: center; font-size: 11px; font-family: var(--font-mono); color: var(--muted); margin-bottom: 16px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">Monitoring</div>
      <div class="header-plant" id="plant-name">My Plant</div>
      <div class="conn-indicator">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-label">Not connected</span>
      </div>
    </div>
    <button class="settings-btn" onclick="openSettings()" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="gauge-card" id="gauge-card">
    <div class="gauge-wrap">
      <svg viewBox="0 0 200 115" xmlns="http://www.w3.org/2000/svg">
        <path d="M20,105 A80,80 0 0,1 180,105" fill="none" stroke="#1c1c1c" stroke-width="12" stroke-linecap="round"/>
        <path id="gauge-arc" d="M20,105 A80,80 0 0,1 180,105" fill="none" stroke="#5aff7e" stroke-width="12" stroke-linecap="round" stroke-dasharray="251" stroke-dashoffset="88"/>
      </svg>
      <div class="gauge-pct" id="gauge-pct" style="color: var(--green)">--%</div>
    </div>
    <div class="status-pill pill-ok" id="status-pill">
      <span class="pill-dot"></span>
      <span id="status-text">Waiting for reading</span>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Moisture</div>
      <div class="metric-value" id="m-pct">--<span class="metric-unit">%</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">Raw ADC</div>
      <div class="metric-value" id="m-raw">----</div>
    </div>
  </div>

  <div class="history-card">
    <div class="history-header">
      <div class="history-title">History</div>
      <div class="history-count" id="hist-count">0 readings</div>
    </div>
    <div class="bars" id="bars"></div>
  </div>

  <div class="last-updated" id="last-updated">No readings yet</div>

  <button class="refresh-btn" id="refresh-btn" onclick="fetchReading()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    Refresh now
  </button>
</div>

<!-- Settings -->
<div class="settings-overlay" id="settings-overlay" onclick="overlayClick(event)">
  <div class="settings-panel">
    <div class="settings-handle"></div>
    <div class="settings-title">Settings</div>
    <div class="field">
      <label>Plant name</label>
      <input type="text" id="s-name" placeholder="My plant" value="My Plant">
    </div>
    <div class="field">
      <label>ESP32 IP address</label>
      <input type="text" id="s-ip" placeholder="192.168.0.25" inputmode="decimal">
    </div>
    <div class="field">
      <label>Auto-refresh every (seconds)</label>
      <input type="number" id="s-interval" placeholder="5" min="2" max="60" value="5">
    </div>
    <div class="field">
      <label>Dry below (%)</label>
      <input type="number" id="s-dry" placeholder="30" min="0" max="100" value="30">
    </div>
    <div class="field">
      <label>Wet above (%)</label>
      <input type="number" id="s-wet" placeholder="70" min="0" max="100" value="70">
    </div>
    <button class="save-btn" onclick="saveSettings()">Save settings</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var settings = {
    ip: '',
    name: 'My Plant',
    interval: 5,
    dry: 30,
    wet: 70
  };
  var history = [];
  var timer = null;

  function load() {
    try {
      var s = JSON.parse(localStorage.getItem('plantmon') || '{}');
      if (s.ip) settings.ip = s.ip;
      if (s.name) settings.name = s.name;
      if (s.interval) settings.interval = s.interval;
      if (s.dry !== undefined) settings.dry = s.dry;
      if (s.wet !== undefined) settings.wet = s.wet;
    } catch(e) {}
    document.getElementById('plant-name').textContent = settings.name;
    document.getElementById('s-ip').value = settings.ip;
    document.getElementById('s-name').value = settings.name;
    document.getElementById('s-interval').value = settings.interval;
    document.getElementById('s-dry').value = settings.dry;
    document.getElementById('s-wet').value = settings.wet;
    if (settings.ip) startTimer();
  }

  function save() {
    localStorage.setItem('plantmon', JSON.stringify(settings));
  }

  function colorFor(v) {
    if (v < settings.dry) return '#ffb830';
    if (v >= settings.wet) return '#4aadff';
    return '#5aff7e';
  }

  function update(moisture, raw, status) {
    var color = colorFor(moisture);
    var arc = document.getElementById('gauge-arc');
    var offset = 251 - (moisture / 100) * 251;
    arc.style.strokeDashoffset = offset;
    arc.style.stroke = color;

    document.getElementById('gauge-pct').textContent = moisture + '%';
    document.getElementById('gauge-pct').style.color = color;
    document.getElementById('m-pct').innerHTML = moisture + '<span class="metric-unit">%</span>';
    document.getElementById('m-raw').textContent = raw;

    var pill = document.getElementById('status-pill');
    var txt = document.getElementById('status-text');
    var card = document.getElementById('gauge-card');
    pill.className = 'status-pill';
    card.className = 'gauge-card';

    if (status === 'DRY') {
      pill.classList.add('pill-dry');
      txt.textContent = 'Soil is dry — water needed';
      card.classList.add('dry');
    } else if (status === 'WET') {
      pill.classList.add('pill-wet');
      txt.textContent = 'Soil is wet — no watering';
      card.classList.add('wet');
    } else {
      pill.classList.add('pill-ok');
      txt.textContent = 'Soil is OK';
    }

    history.push({ v: moisture, color: color });
    if (history.length > 12) history.shift();
    renderBars();

    var now = new Date();
    document.getElementById('last-updated').textContent =
      'Last updated ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');

    var dot = document.getElementById('conn-dot');
    dot.className = 'conn-dot live';
    document.getElementById('conn-label').textContent = 'Live · ' + settings.ip;
  }

  function renderBars() {
    var el = document.getElementById('bars');
    el.innerHTML = '';
    var max = Math.max.apply(null, history.map(function(h){ return h.v; })) || 100;
    history.forEach(function(h) {
      var b = document.createElement('div');
      b.className = 'bar';
      b.style.height = Math.max(4, (h.v / 100) * 100) + '%';
      b.style.background = h.color;
      b.style.opacity = '0.7';
      el.appendChild(b);
    });
    document.getElementById('hist-count').textContent = history.length + ' reading' + (history.length !== 1 ? 's' : '');
  }

  function fetchReading() {
    if (!settings.ip) { openSettings(); return; }
    var btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    fetch('http://' + settings.ip + '/reading')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        btn.classList.remove('spinning');
        update(d.moisture, d.raw, d.status);
      })
      .catch(function() {
        btn.classList.remove('spinning');
        var dot = document.getElementById('conn-dot');
        dot.className = 'conn-dot error';
        document.getElementById('conn-label').textContent = 'Connection failed';
        showToast('Could not reach ' + settings.ip);
      });
  }

  function startTimer() {
    if (timer) clearInterval(timer);
    timer = setInterval(fetchReading, settings.interval * 1000);
    fetchReading();
  }

  function openSettings() {
    document.getElementById('settings-overlay').classList.add('open');
  }

  function overlayClick(e) {
    if (e.target === document.getElementById('settings-overlay')) closeSettings();
  }

  function closeSettings() {
    document.getElementById('settings-overlay').classList.remove('open');
  }

  function saveSettings() {
    settings.name = document.getElementById('s-name').value || 'My Plant';
    settings.ip = document.getElementById('s-ip').value.trim();
    settings.interval = parseInt(document.getElementById('s-interval').value) || 5;
    settings.dry = parseInt(document.getElementById('s-dry').value) || 30;
    settings.wet = parseInt(document.getElementById('s-wet').value) || 70;
    document.getElementById('plant-name').textContent = settings.name;
    save();
    closeSettings();
    if (settings.ip) startTimer();
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  load();
</script>
</body>
</html>
